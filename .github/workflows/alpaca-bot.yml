name: Alpaca Trading Bot

on:
  # Sole trigger: cron-job.org hits this workflow_dispatch endpoint every 15 min
  # during market hours (America/Chicago). The GitHub-native schedule was removed
  # so the two don't double-fire (which risks duplicate orders). The bot's own
  # 9:45–3:55 ET gate is the real control.
  workflow_dispatch:
    inputs:
      email_test:
        description: "Send a test email and exit"
        type: boolean
        default: false
      order_test:
        description: "Place a $1 paper test order and exit (paper only)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One run at a time — stops overlapping runs from racing to commit trade_log.jsonl
# (the cause of the intermittent "job cancelled" emails). In-progress runs finish;
# a new trigger queues behind them. Trading is unaffected either way.
concurrency:
  group: alpaca-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write   # allow committing trade_log.jsonl back to the repo
      actions: write    # allow dispatching brief.yml when the plan is stale
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GitHub's native cron (brief.yml) regularly fires hours late or not at all
      # (skipped entirely on 2026-06-10). cron-job.org triggers THIS workflow
      # reliably — so bootstrap the brief from here: if daily_plan.json isn't
      # today's, dispatch it. The bot trades neutral this run and picks up the
      # fresh plan next run (15 min later).
      - name: Ensure fresh research brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today=$(TZ=America/New_York date +%F)
          plan_date=$(python3 -c "import json; print(json.load(open('daily_plan.json')).get('date',''))" 2>/dev/null || echo "none")
          if [ "$plan_date" != "$today" ]; then
            echo "plan stale ($plan_date != $today) — dispatching brief.yml"
            gh workflow run brief.yml --repo "$GITHUB_REPOSITORY" || true
          else
            echo "plan is fresh ($plan_date)"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-alpaca.txt

      - name: Run Alpaca bot
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TEST:         ${{ inputs.email_test }}
          ORDER_TEST:         ${{ inputs.order_test }}
        run: python alpaca_bot.py

      - name: Persist trade log + holds ledger
        if: always()
        run: |
          changed=""
          for f in trade_log.jsonl holds.json; do
            if [ -n "$(git status --porcelain -- "$f")" ]; then git add -- "$f"; changed=1; fi
          done
          if [ -n "$changed" ]; then
            git config user.name  "alpaca-bot"
            git config user.email "alpaca-bot@users.noreply.github.com"
            git commit -m "trade log $(date -u +%FT%TZ)"
            git push || (git pull --rebase --autostash origin main && git push) || true
          else
            echo "no new trades to log"
          fi
