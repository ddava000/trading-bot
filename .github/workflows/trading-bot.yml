name: Robinhood Trading Bot

on:
  # Single trigger: cron-job.org pings the workflow_dispatch API every 15 min
  # during market hours (America/Chicago schedule). The GitHub-native `schedule:`
  # cron was removed to avoid double-runs (doubles Actions minutes on a private repo).
  # The bot's own market-hours gate (9:45 AM–3:55 PM ET) is the real safety check.
  workflow_dispatch:
    inputs:
      email_test:
        description: "Send a test email and exit (leave off for normal runs)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warning

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          RH_USERNAME:        ${{ secrets.RH_USERNAME }}
          RH_PASSWORD:        ${{ secrets.RH_PASSWORD }}
          RH_TOTP_SECRET:     ${{ secrets.RH_TOTP_SECRET }}
          RH_SESSION_B64:     ${{ secrets.RH_SESSION_B64 }}
          RH_API_VERSION:     ${{ secrets.RH_API_VERSION }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TEST:         ${{ inputs.email_test }}
        run: python main.py
