name: Robinhood Trading Bot

on:
  schedule:
    # Fallback: every 15 min, 1 PM–8 PM UTC = 9 AM–4 PM ET
    # Primary trigger: cron-job.org hits the workflow_dispatch API every 15 min
    # Bot's own market-hours check (9:45 AM–3:55 PM ET) is the real gate
    - cron: "*/15 13-20 * * 1-5"
  workflow_dispatch:   # lets you trigger a manual run from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warning

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          RH_USERNAME:    ${{ secrets.RH_USERNAME }}
          RH_PASSWORD:    ${{ secrets.RH_PASSWORD }}
          RH_TOTP_SECRET: ${{ secrets.RH_TOTP_SECRET }}
          RH_SESSION_B64: ${{ secrets.RH_SESSION_B64 }}
        run: python main.py
